<div class="min-h-screen bg-[var(--color-paper)] animate-fade-in-up">
  <main class="mx-auto max-w-4xl px-6 py-6">

    <!-- Header -->
    <div
      class="mb-6 flex justify-between items-center border border-[var(--color-border-warm)] bg-white px-6 py-4 shadow-sm crop-marks relative">
      <div class="flex flex-col">
        <p class="font-ticket text-xs uppercase tracking-widest text-[var(--color-accent)] font-semibold">Configuración
          de Accesos</p>
        <h1 class="text-2xl font-bold text-[var(--color-ink)] uppercase tracking-tight">Gestión de Usuarios</h1>
      </div>
      <span
        class="font-ticket text-xs text-neutral-500 border border-neutral-200 px-2 py-0.5 uppercase bg-neutral-50">Solo
        Administradores</span>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">

      <!-- Form Container -->
      <div
        class="crop-marks relative rounded-sm border border-[var(--color-border-warm)] bg-white p-5 shadow-sm h-fit md:col-span-1">
        <h2 class="mb-4 text-lg font-bold text-[var(--color-ink)] uppercase tracking-tight">Nuevo Operario / Admin</h2>

        <form [formGroup]="form" (ngSubmit)="crearUsuario()" class="flex flex-col gap-3">
          <div class="flex flex-col gap-1">
            <label hlmLabel for="nombre">Nombre completo</label>
            <input hlmInput id="nombre" formControlName="nombre" placeholder="ej. Carlos Pérez" />
          </div>

          <div class="flex flex-col gap-1">
            <label hlmLabel for="email">Correo electrónico</label>
            <input hlmInput id="email" type="email" formControlName="email" placeholder="ej. carlos@imprenta.com" />
          </div>

          <div class="flex flex-col gap-1">
            <label hlmLabel for="password">Contraseña</label>
            <input hlmInput id="password" type="password" formControlName="password"
              placeholder="Mínimo 4 caracteres" />
          </div>

          <div class="flex flex-col gap-1">
            <label hlmLabel>Rol en el sistema</label>
            <hlm-select formControlName="rol" (valueChange)="onRolChange($event)">
              <hlm-select-trigger class="border flex w-full cursor-pointer">
                <hlm-select-value placeholder="Seleccione un rol" />
              </hlm-select-trigger>
              <hlm-select-content *hlmSelectPortal>
                <hlm-select-group>
                  <hlm-select-label>Roles</hlm-select-label>
                  <hlm-select-item value="OPERARIO">OPERARIO (Taller)</hlm-select-item>
                  <hlm-select-item value="ADMIN">ADMINISTRADOR</hlm-select-item>
                </hlm-select-group>
              </hlm-select-content>
            </hlm-select>
          </div>

          <button hlmBtn type="submit" [disabled]="form.invalid || guardando()"
            class="w-full font-ticket uppercase tracking-wider text-xs mt-2 cursor-pointer">
            {{ guardando() ? 'Registrando...' : '+ Crear Usuario' }}
          </button>
        </form>
      </div>

      <!-- Users List -->
      <div
        class="crop-marks relative rounded-sm border border-[var(--color-border-warm)] bg-white p-5 shadow-sm md:col-span-2">
        <h2 class="mb-4 text-lg font-bold text-[var(--color-ink)] uppercase tracking-tight">Usuarios Registrados</h2>

        <div hlmTableContainer class="overflow-hidden border border-[var(--color-border-warm)] bg-white">
          <table hlmTable class="w-full text-sm">
            <thead hlmTHead>
              <tr hlmTr class="border-b border-[var(--color-border-warm)] hover:bg-transparent">
                <th hlmTh class="px-4 py-3 font-semibold text-neutral-500 w-1/3">Nombre</th>
                <th hlmTh class="px-4 py-3 font-semibold text-neutral-500 w-1/3">Email</th>
                <th hlmTh class="px-4 py-3 font-semibold text-neutral-500 w-1/6">Rol</th>
                <th hlmTh class="px-4 py-3 font-semibold text-neutral-500 w-1/6 text-right">Acción</th>
              </tr>
            </thead>
            <tbody hlmTBody>
              @for (u of usuarios(); track u.id) {
              <tr hlmTr class="divisor-ticket hover:bg-neutral-50/50 transition-colors">
                <td hlmTd class="px-4 py-3 font-medium text-neutral-700">{{ u.nombre }}</td>
                <td hlmTd class="px-4 py-3 text-neutral-600 font-mono text-xs">{{ u.email }}</td>
                <td hlmTd class="px-4 py-3">
                  <span
                    class="px-1.5 py-0.5 font-ticket text-[9px] uppercase tracking-wider font-bold rounded-sm border"
                    [class]="u.rol === 'ADMIN' ? 'bg-red-50 text-red-700 border-red-200' : 'bg-blue-50 text-blue-700 border-blue-200'">
                    {{ u.rol }}
                  </span>
                </td>
                <td hlmTd class="px-4 py-3 text-right">
                  <button (click)="eliminarUsuario(u.id)"
                    class="text-xs text-[var(--color-accent)] font-semibold hover:underline cursor-pointer">
                    Eliminar
                  </button>
                </td>
              </tr>
              } @empty {
              <tr>
                <td colspan="4" class="p-6 text-center text-sm text-neutral-500 font-medium">No hay usuarios
                  registrados.</td>
              </tr>
              }
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>
